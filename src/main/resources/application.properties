
# Base de datos
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${PGUSER:postgres}
quarkus.datasource.password=${PGPASSWORD:d011175}

quarkus.datasource.jdbc.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:haccphoenix}?sslmode=${PGSSLMODE:disable}

# Puerto y host para Railway
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# CORS - Origins permitidos adicionales (separados por coma)
# Setear la variable CORS_ALLOWED_ORIGINS en Railway
# Ej: https://haccphoenix.vercel.app,https://mi-dominio.com
# Si no se setea, solo funcionan los DEFAULT_ALLOWED_ORIGINS del CorsFilter
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Perfil prod: suprime logs SQL por defecto
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.log.level=INFO
